version: "3.8"

services:
  db:
    image: ankane/pgvector:latest
    container_name: antigravity_pgvector
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: antigravity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: antigravity_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
